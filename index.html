<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Data Science Portfolio</title>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
        <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
        <link rel="stylesheet" href="https://unpkg.com/amis@beta/sdk/sdk.css" />
        <link rel="stylesheet" href="https://unpkg.com/amis@beta/sdk/helper.css" />
        <style>
            html,
            body,
            .app-wrapper {
                position: relative;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
            }
        </style>
    </head>
    <body>
        <div id="root" class="app-wrapper"></div>
        <script src="https://unpkg.com/amis@beta/sdk/sdk.js"></script>
        <script type="text/javascript">
      (function () {

                  {
                    "type": "website",
                    "link": "https://icsearch-15.azurewebsites.net/"
                  }
                ]
              },
              {

                  {
                    "type": "GitHub repository",
                    "link": "https://github.com/spencerlli/CKFM-enrollment-check-in-out-system"
                  }

                "rows": [
                  {
                    "type": "report",
                    "link": "https://github.com/YuanZzhang/yuanzzhang.github.io/blob/main/static/minesweeper/report.pdf"
                  },
                  {
                    "type": "sample source code",
                    "link": "https://github.com/YuanZzhang/yuanzzhang.github.io/blob/main/static/minesweeper/code.py"
                  }
                ]
              },
              {
                "name": "Campaign Finance Visualization",
                "date": "March 2022",
                "summary": "A visual data exploration of campaign finance data.",
                "type": ["project", "data visualization"],
                "description": 'This project involved the exploration of candidate campaign finance data using data visualization concepts from "Fundamentals of Data Visualization." The data set, consisting of 26,000+ rows and 50 columns, covered financial activity for candidates from 2008 to 2020 as reported to the U.S. Federal Election Commission.',
                "rows": [
                  {
                    "type": "report",
                    "link": "https://yuanzzhang.github.io/cf-dataviz/dataviz"
                  },
                  {
                    "type": "GitHub repository",
                    "link": "https://github.com/YuanZzhang/cf-dataviz"
                  }
                ]
              },
              {
                "name": "Smart Predictor Pro",
                "date": "Nov. 2021 - Dec. 2021",
                "summary": "A machine learning project for predicting customer churn behavior.",
                "type": ["project", "machine learning"],

                  {
                    "type": "report",

                    "type" : "sample graphics",

                  {
                    "type": "GitHub repository",
                    "link": "https://github.com/YuanZzhang/EDA-billionaires"
                  }
                ]
              }
            ]
          },
          "body": {
            "type": "cards",
            "source": "${items}",
            "card": {
              "header": {
                "title": "${name}",
                "titleClassName": "text-lg",
                "subTitle": "${date}",
                "subTitleClassName": "text-sm m-b-xs",
                "description": "${summary}"
              },
              "body": [
                {
                  "name": "type",
                  "type": "each",
                  "items": {
                    "name": "item",
                    "type": "tag",
                    "className": "m-b-xs"
                  }
                }
              ],
              "itemAction": {
                "type": "button",
                "actionType": "dialog",
                "dialog": {
                  "title": "${name}",
                  "body": [
                    {
                      "type": "tpl",
                      "tpl": "${description}"
                    },
                    {
                      "type": "table",
                      "source": "${rows}",
                      "className": "m-t-lg",
                      "columns": [
                        {
                          "name": "type",
                          "label": "Materials"
                        },
                        {
                          "label": "Link",
                          "name": "link",
                          "type": "link"
                        }
                      ]
                    }
                  ],
                  "actions": [
                    {
                      "type": "button",
                      "actionType": "close",
                      "label": "Close"
                    }
                  ],
                  "closeOnEsc": true,
                  "closeOnOutside": true,

              }
            }

        let amisScoped = amis.embed('#root', amisJSON, {locale: 'en-US'});
      })();
        </script>
    </body>
</html>
