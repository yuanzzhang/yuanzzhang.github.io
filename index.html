<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Data Science Portfolio</title>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
        <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
        <link rel="stylesheet" href="https://unpkg.com/amis@beta/sdk/sdk.css" />
        <link rel="stylesheet" href="https://unpkg.com/amis@beta/sdk/helper.css" />
        <style>
            html,
            body,
            .app-wrapper {
                position: relative;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
            }
        </style>
    </head>
    <body>
        <div id="root" class="app-wrapper"></div>
        <script src="https://unpkg.com/amis@beta/sdk/sdk.js"></script>
        <script type="text/javascript">
      (function () {
        let amis = amisRequire('amis/embed');
        let amisJSON = {
          "type": "page",
          "title": "Zhang's Data Science Portfolio",
          "data": {
            "items": [
              {
                "name": "ICSearch",
                "date": "Nov. 2022 - Dec. 2022",
                "summary": "A web search engine under the ICS subdomain.",
                "type": ["proj", "algo", "struct"],
                "description": "A scalable and efficient web search engine was developed and implemented using Python. An index with caching on over 55,000 web pages (crawled in 2020) under the Information and Computer Science (ICS) subdomain was constructed to improve query response times. The project also included the design and deployment of a user-friendly web interface using Flask and Azure Web Apps.",
                "rows": [
                  {
                    "type": "website",
                    "link": "https://icsearch-15.azurewebsites.net/"
                  }
                ]
              },
              {
                "name": "Smart Predictor Pro",
                "date": "Nov. 2021 - Dec. 2021",
                "summary": "A machine learning project for predicting customer churn behavior.",
                "type": ["proj", "ml"],
                "description": "In this project, a machine learning study was conducted on customer analytics data to predict customer behavior, such as churn. Various classifiers were experimented with and their hyperparameters were tuned to improve model accuracy. The resulting model achieved a strong performance, ranking 32nd out of 101 teams in a Kaggle competition. This project was completed in a team of 2.",
                "rows": [
                  {
                    "type": "report",
                    "link": "https://yuanzzhang.github.io/static/spp/report.pdf"
                  },
                  {
                    "type": "sample source code",
                    "link": "https://yuanzzhang.github.io/static/spp/code.ipynb"
                  },
                  {
                    "type": "Kaggle leaderboard",
                    "link": "https://www.kaggle.com/competitions/uci-cs178-f21/leaderboard?"
                  }
                ]
              },
              {
                "name": "Study of Billionaires",
                "date": "May 2021 - June 2021",
                "summary": "An exploratory data analysis of billionaire data.",
                "type": ["proj", "analysis", "dataviz", "stats"],
                "description": "This project analyzed the Forbes World's Billionaires lists from 1996-2014. The goal was to identify factors influencing the rank of billionaires based on their income. The analysis included a simple linear regression of the relationship between age and wealth, and a randomization test on the difference in mean wealth between male and female billionaires in 2014.",
                "rows": [
                  {
                    "type": "slides",
                    "link": "https://yuanzzhang.github.io/static/billionaires/slides.pdf"
                  },
                  {
                    "type": "video",
                    "link": "https://drive.google.com/file/d/1_jV6IqtqNgBcwnWkMZOnaoa9zYZsjsvl/view"
                  },
                  {
                    "type": "GitHub repository",
                    "link": "https://github.com/YuanZzhang/EDA-billionaires"
                  }
                ]
              },
              // {
              //   "name": "Campaign Finance Stories",
              //   "type": ["proj", "algo"],
              //   "description": ""
              // },
              // {
              //   "name": "Minesweeper AI",
              //   "type": ["proj", "algo"],
              //   "description": ""
              // },
              // {
              //   "name": "Attendance Pro",
              //   "type": ["proj", "algo"],
              //   "description": ""
              // },
              // {
              //   "name": "DQbeauty",
              //   "type": ["proj", "algo"],
              //   "description": ""
              // }
            ]
          },
          "body": {
            "type": "cards",
            "source": "${items}",
            "card": {
              "header": {
                "title": "${name}",
                "titleClassName": "text-lg",
                "subTitle": "${date}",
                "subTitleClassName": "text-sm m-b-xs",
                "description": "${summary}"
              },

              "body": [
                {
                  "type": "mapping",
                  "name": "${type | asArray}",
                  "map": {
                    "proj": {
                      "type": "tag",
                      "label": "project",
                      "displayMode": "rounded",
                      "color": "active"
                    },
                    "algo": {
                      "type": "tag",
                      "label": "algorithms",
                      "displayMode": "rounded",
                      "color": "#4096ff"
                    },
                    "struct": {
                      "type": "tag",
                      "label": "data structures",
                      "displayMode": "rounded",
                      "color": "#4096ff"
                    },
                    "ml": {
                      "type": "tag",
                      "label": "machine learning",
                      "displayMode": "rounded",
                      "color": "#4096ff"
                    },
                    "analysis": {
                      "type": "tag",
                      "label": "data analysis",
                      "displayMode": "rounded",
                      "color": "#4096ff"
                    },
                    "dataviz": {
                      "type": "tag",
                      "label": "data visualization",
                      "displayMode": "rounded",
                      "color": "#4096ff"
                    },
                    "stats": {
                      "type": "tag",
                      "label": "statistics",
                      "displayMode": "rounded",
                      "color": "#4096ff"
                    }
                  }
                }
              ],
              "itemAction": {
                "type": "button",
                "actionType": "dialog",
                "dialog": {
                  "title": "${name}",
                  "body": [
                    {
                      "type": "tpl",
                      "tpl": "${description}"
                    },
                    {
                      "type": "table",
                      "source": "${rows}",
                      "className": "m-t-lg",
                      "columns": [
                        {
                          "label": "Type",
                          "name": "type"
                        },
                        {
                          "label": "Link",
                          "name": "link",
                          "type": "link"
                        }
                      ]
                    }
                  ],
                  "actions": [
                    {
                      "type": "button",
                      "actionType": "close",
                      "label": "Close"
                    }
                  ],
                  "closeOnEsc": true,
                  "closeOnOutside": true,
                }
              }
            }
          }
        };
        let amisScoped = amis.embed('#root', amisJSON, {locale: 'en-US'});
      })();
        </script>
    </body>
</html>
